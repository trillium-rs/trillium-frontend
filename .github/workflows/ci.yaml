name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  RUSTFLAGS: -Dwarnings

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, nightly]

    steps:
    - uses: actions/checkout@v4
    - name: Install ${{ matrix.rust }}
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}

    - uses: Swatinem/rust-cache@v2
    - name: Tests
      run: cargo test --workspace
      env:
        RUST_LOG: trace

    # Slow, toolchain-specific source-tracking tests (see tests/source_tracking.rs).
    # #[ignore]d, so the step above skips them; run them explicitly here. Each scenario
    # self-skips when its toolchain isn't installed, so the stable/nightly matrix covers
    # both the build.rs shim and the native proc_macro_tracked_path path. Serial by design:
    # the builds are CPU-bound (parallelism buys little) and it keeps memory and logs sane.
    - name: Source-tracking integration tests
      run: cargo test --test source_tracking -- --ignored --test-threads=1

  check_fmt_and_docs:
    name: Checking fmt, clippy, and docs
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - uses: giraffate/clippy-action@v1
      with:
        reporter: 'github-pr-review'
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: fmt
      run: cargo fmt --all -- --check

    - name: Build Documentation
      run: cargo doc --workspace --no-deps
